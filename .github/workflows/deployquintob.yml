name: Flask app

on:
  push:
    branches: [ "main" ]


permissions:
  contents: read
  packages: write

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v3
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: pip install -r requeriments.txt

    - name: Contruir la imagen de Docker
      run: docker build -t ghcr.io/tonyj0711/holaflask:1.0.0 . 

    - name: Login hacia GitHub Container Registry
      run: echo "${{ secrets.TOKEN_WR }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Publicar la imagen 
      run: docker push ghcr.io/tonyj0711/holaflask:1.0.0
    - name: Mostrar variables o secrets 
      run: |
           echo "Probando servidor ssh"
           echo "Host: ${{ secrets.VPS_HOST }}"
           echo "User: ${{ secrets.VPS_USER }}"
           echo "Port: ${{ secrets.VPS_SSH_PORT }}"
           echo "Password: ${{ secrets.VPS_PASSWORD }}"

    - name: Probar conexion ssh
      uses: appleboy/ssh-actions@v1 
      with: 
        host: ${{secrets.VPS_HOST}}
        username: ${{secrets.VPS_USER}}
        password: ${{secrets.VPS_PASSWORD}}
        port: ${{secrets.VPS_SSH_PORT}} 
        script: |
          echo "Conexion ssh exitosa"
          touch ejemplo.txt

